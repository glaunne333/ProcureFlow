services:
  - type: web
    name: procureflow-api
    runtime: docker
    dockerContext: ./server
    dockerfilePath: ./server/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: portfolio-demo
      - key: Jwt__Audience
        value: portfolio-demo
      - key: Cors__AllowedOrigins
        sync: false
