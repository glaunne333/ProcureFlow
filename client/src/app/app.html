<header class="topbar">
  <a class="brand" routerLink="/"><svg lucideWorkflow size="18"></svg> ProcureFlow by Mark Vigo</a>
  @if (user(); as currentUser) {
    <nav class="nav">
      <a routerLink="/"><svg lucideList size="16"></svg> Requests</a>
      @if (currentUser.role === 'Employee') {
        <a routerLink="/requests/new"><svg lucidePlus size="16"></svg> New Request</a>
      }
      <span
        class="role-badge"
        [class.role-employee]="currentUser.role === 'Employee'"
        [class.role-manager]="currentUser.role === 'Manager'"
        [class.role-finance]="currentUser.role === 'Finance'">
        {{ currentUser.role }}
      </span>
      <button type="button" (click)="logout()"><svg lucideLogOut size="16"></svg> Sign out</button>
    </nav>
  }
</header>

<main class="page">
  <router-outlet />
</main>
